<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lojistik Yönetim Sistemi - Profesyonel Panel</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --secondary: #475569;
            --success: #16a34a;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--background);
            margin: 0;
            padding: 20px;
            color: #0f172a;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border);
        }

        /* Ana Grid Tasarımı */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-bottom: 24px;
        }

            .card h2 {
                margin-top: 0;
                font-size: 1.25rem;
                color: var(--secondary);
                border-bottom: 1px solid var(--border);
                padding-bottom: 12px;
                margin-bottom: 20px;
            }

        /* Harita */
        #harita {
            height: 450px;
            border-radius: 12px;
            border: 1px solid var(--border);
            z-index: 1;
        }

        /* Form Elemanları */
        .form-group {
            margin-bottom: 16px;
        }

            .form-group label {
                display: block;
                margin-bottom: 6px;
                font-weight: 600;
                font-size: 0.9rem;
            }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            transition: 0.2s;
        }

            input:focus, select:focus {
                outline: none;
                border-color: var(--primary);
                box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

            button:hover {
                background-color: #1d4ed8;
                transform: translateY(-1px);
            }

        .btn-success {
            background-color: var(--success);
        }

            .btn-success:hover {
                background-color: #15803d;
            }

        /* İlan Listesi */
        .ilan-item {
            background: var(--background);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ilan-badge {
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* Canlı Bildirim Kutusu (Toast) */
        #notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: white;
            border-left: 4px solid var(--primary);
            padding: 16px 24px;
            margin-bottom: 10px;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            animation: slideIn 0.5s ease-out;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Fatura Sonuç Ekranı */
        #fiyatSonuc {
            margin-top: 20px;
            padding: 15px;
            background-color: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="notification-container"></div>

    <div class="header">
        <div>
            <h1 style="margin: 0; color: #1e293b;">Lojistik Platformu</h1>
            <p style="margin: 5px 0 0 0; color: #64748b;">Merkezi Yönetim ve Operasyon Paneli</p>
        </div>
        <div id="connectionStatus" style="padding: 8px 16px; background: #fee2e2; color: #991b1b; border-radius: 20px; font-weight: bold; font-size: 14px;">
            🔴 Telsiz Bağlantısı Bekleniyor...
        </div>
    </div>

    <div class="dashboard-grid">

        <div class="left-column">
            <div class="card">
                <h2>🌍 Canlı Sevkiyat ve Rota Takibi</h2>
                <div id="harita"></div>
            </div>

            <div class="card">
                <h2>🚚 Açık Yük İlanları</h2>
                <button onclick="ilanlariGetir()" style="margin-bottom: 15px;">🔄 Veritabanından İlanları Çek</button>
                <div id="ilanListesi">
                    <p style="color: #64748b; text-align: center;">Henüz ilan çekilmedi.</p>
                </div>
            </div>
        </div>

        <div class="right-column">

            <div class="card">
                <h2>🤖 Akıllı Fiyat Motoru (EPDK Destekli)</h2>
                <div class="form-group">
                    <label>Çıkış Şehri</label>
                    <input type="text" id="calcOrigin" placeholder="Örn: İstanbul">
                </div>
                <div class="form-group">
                    <label>Varış Şehri</label>
                    <input type="text" id="calcDest" placeholder="Örn: Ankara">
                </div>
                <div class="form-group">
                    <label>Araç Tipi</label>
                    <select id="calcVehicle">
                        <option value="TIR">TIR (35 Lt/100km)</option>
                        <option value="KAMYON">Kamyon (25 Lt/100km)</option>
                        <option value="KAMYONET">Kamyonet (12 Lt/100km)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ek Masraflar (Köprü, Otoyol vb.) TL</label>
                    <input type="number" id="calcExtra" value="0">
                </div>
                <button class="btn-success" onclick="fiyatHesapla()">Fiyat Çıkar</button>

                <div id="fiyatSonuc"></div>
            </div>

            <div class="card">
                <h2>📄 Resmi Evrak Yükleme</h2>
                <form id="uploadForm" onsubmit="evrakYukle(event)">
                    <div class="form-group">
                        <label>İlan Numarası (ID)</label>
                        <input type="number" id="docShipmentId" required>
                    </div>
                    <div class="form-group">
                        <label>Evrak Tipi</label>
                        <select id="docType">
                            <option value="İrsaliye">İrsaliye</option>
                            <option value="CMR">CMR Belgesi</option>
                            <option value="Hasar_Durumu">Yük Fotoğrafı</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Dosya Seçin</label>
                        <input type="file" id="docFile" required accept="image/*,.pdf">
                    </div>
                    <button type="submit" style="background-color: #64748b;">Güvenli Yükle</button>
                </form>
            </div>

        </div>
    </div>

    <script>
        // --- 1. HARİTA ALTYAPISI ---
        var map = L.map('harita').setView([39.0, 35.0], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        var routeLayer = L.layerGroup().addTo(map);

        const sehirKoordinatlari = {
            "İstanbul": [41.0082, 28.9784], "Ankara": [39.9208, 32.8541],
            "İzmir": [38.4192, 27.1287], "Bursa": [40.1885, 29.0610],
            "Adana": [36.9914, 35.3308], "Van": [38.5012, 43.3730], "Mersin": [36.8121, 34.6415]
        };

        function rotayiCiz(baslangic, varis) {
            routeLayer.clearLayers();
            const startPos = sehirKoordinatlari[baslangic] || sehirKoordinatlari["İstanbul"]; // Bulamazsa varsayılan
            const endPos = sehirKoordinatlari[varis] || sehirKoordinatlari["Ankara"];

            L.marker(startPos).addTo(routeLayer).bindPopup("Çıkış: " + baslangic);
            L.marker(endPos).addTo(routeLayer).bindPopup("Varış: " + varis);

            var line = L.polyline([startPos, endPos], { color: '#2563eb', weight: 4, opacity: 0.8 }).addTo(routeLayer);
            map.fitBounds(line.getBounds(), { padding: [50, 50] });
        }


        // --- 2. SIGNALR (CANLI BİLDİRİM TELSİZİ) ---
        // Backend'deki NotificationHub adresimize bağlanıyoruz
        const connection = new signalR.HubConnectionBuilder()
            .withUrl("http://localhost:5199/notificationHub")
            .withAutomaticReconnect()
            .build();

        connection.on("ReceiveNotification", function (message) {
            showToast("🔔 " + message);
        });

        connection.start().then(function () {
            document.getElementById("connectionStatus").innerHTML = "🟢 Telsiz Bağlantısı Aktif";
            document.getElementById("connectionStatus").style.background = "#dcfce7";
            document.getElementById("connectionStatus").style.color = "#166534";

            // Simüle edilmiş Kullanıcı 1 (Backend'de test için CustomerId=1 vermiştik)
            connection.invoke("JoinUserGroup", 1).catch(err => console.error(err));
        }).catch(function (err) {
            console.error("SignalR Bağlantı Hatası: ", err);
        });

        function showToast(message) {
            const container = document.getElementById("notification-container");
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.innerHTML = `<strong>Sistem Mesajı:</strong> ${message}`;
            container.appendChild(toast);

            // 5 saniye sonra bildirimi sil
            setTimeout(() => { toast.remove(); }, 5000);
        }


        // --- 3. API İSTEKLERİ (C# BACKEND'E BAĞLANTI) ---
        const API_URL = "http://localhost:5199/api";

        // İlanları Getir
        async function ilanlariGetir() {
            const listeDiv = document.getElementById("ilanListesi");
            listeDiv.innerHTML = "<em>Yükleniyor...</em>";

            try {
                const response = await fetch(`${API_URL}/Shipments`);
                if (!response.ok) throw new Error("Veri çekilemedi");

                // Backend'den Pagination (sayfalama) modeli dönüyor. Asıl veriler "data" içinde.
                const jsonResponse = await response.json();
                const ilanlar = jsonResponse.data;

                listeDiv.innerHTML = "";
                ilanlar.forEach(ilan => {
                    listeDiv.innerHTML += `
                            <div class="ilan-item">
                                <div>
                                    <div style="font-size: 1.1rem; margin-bottom:5px;">
                                        <strong>${ilan.originAddress} ➔ ${ilan.destinationAddress}</strong>
                                    </div>
                                    <span class="ilan-badge">${ilan.status}</span>
                                    <span style="margin-left:10px; color:#64748b;">${ilan.weight} Ton</span>
                                </div>
                                <div style="display:flex; gap:10px;">
                                    <button style="background-color:#0284c7; padding: 8px;" onclick="rotayiCiz('${ilan.originAddress}', '${ilan.destinationAddress}')">Harita</button>
                                    <button style="background-color:#16a34a; padding: 8px;" onclick="teklifVer(${ilan.id})">Teklif Ver</button>
                                </div>
                            </div>
                        `;
                });
            } catch (error) {
                listeDiv.innerHTML = `<span style="color:red;">Bağlantı hatası: API çalışıyor mu? (${error.message})</span>`;
            }
        }

        // Akıllı Fiyat Hesapla
        async function fiyatHesapla() {
            const origin = document.getElementById("calcOrigin").value;
            const dest = document.getElementById("calcDest").value;
            const vehicle = document.getElementById("calcVehicle").value;
            const extra = parseFloat(document.getElementById("calcExtra").value);

            try {
                const response = await fetch(`${API_URL}/Pricing/calculate`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ originCity: origin, destinationCity: dest, vehicleType: vehicle, additionalCosts: extra })
                });

                if (response.ok) {
                    const veri = await response.json();
                    const sonucDiv = document.getElementById("fiyatSonuc");
                    sonucDiv.style.display = "block";
                    sonucDiv.innerHTML = `
                            <h4 style="margin:0 0 10px 0; color:#166534;">📊 Fiyat Özeti</h4>
                            <p style="margin:5px 0;"><strong>Rota:</strong> ${veri.rota} (${veri.mesafe})</p>
                            <p style="margin:5px 0;"><strong>Güncel Mazot:</strong> ${veri.guncelMazotFiyati}</p>
                            <p style="margin:5px 0;"><strong>Tahmini Yakıt Maliyeti:</strong> ${veri.hesaplananYakit}</p>
                            <hr style="border:0; border-top:1px dashed #166534; margin:10px 0;">
                            <p style="margin:5px 0; font-size:1.2rem; color:#15803d;"><strong>KDV Dahil Toplam: ${veri.kdvDahilToplam}</strong></p>
                        `;
                }
            } catch (error) {
                alert("Hesaplama başarısız. API ayakta mı kontrol edin.");
            }
        }

        // Hızlı Teklif Verme Simülasyonu
        async function teklifVer(shipmentId) {
            const teklifFiyati = prompt(`${shipmentId} numaralı ilan için teklif edeceğiniz fiyat (TL):`);
            if (!teklifFiyati) return;

            try {
                const response = await fetch(`${API_URL}/Offers`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        shipmentId: shipmentId,
                        price: parseFloat(teklifFiyati),
                        validUntil: new Date(new Date().getTime() + 86400000).toISOString() // 1 gün geçerli
                    })
                });

                if (response.ok) {
                    showToast("Teklifiniz başarıyla iletildi!");
                } else {
                    showToast("Hata: Teklif gönderilemedi.");
                }
            } catch (error) {
                console.error("Teklif Hatası:", error);
            }
        }

        // Evrak Yükleme (Form-Data)
        async function evrakYukle(event) {
            event.preventDefault();

            const shipmentId = document.getElementById("docShipmentId").value;
            const docType = document.getElementById("docType").value;
            const fileInput = document.getElementById("docFile");

            const formData = new FormData();
            formData.append("shipmentId", shipmentId);
            formData.append("documentType", docType);
            formData.append("file", fileInput.files[0]);

            try {
                const response = await fetch(`${API_URL}/Documents/upload`, {
                    method: "POST",
                    body: formData // İçinde dosya olan gönderimlerde Content-Type tarayıcı tarafından otomatik ayarlanır.
                });

                if (response.ok) {
                    showToast("📄 Evrak başarıyla sisteme yüklendi ve ilişkilendirildi.");
                    document.getElementById("uploadForm").reset();
                } else {
                    showToast("❌ Evrak yükleme başarısız. İlan numarasını kontrol edin.");
                }
            } catch (error) {
                alert("Sunucuya bağlanılamadı.");
            }
        }
    </script>
</body>
</html>
