<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lojistik Yönetim Sistemi | Secure Panel</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>

    <style>
        /* --- RENK PALETİ & TEMA (Sert Lacivert & Yumuşak Turuncu) --- */
        :root {
            --navy-dark: #0A192F; /* Sert ve Derin Lacivert */
            --navy-light: #172A45; /* Kart Arka Planları */
            --orange-main: #FF6B00; /* Enerjik Turuncu */
            --orange-hover: #FF8533; /* Yumuşak Turuncu Hover */
            --text-light: #E6F1FF; /* Yumuşak Beyaz/Gri */
            --text-muted: #8892B0; /* Pasif Metinler */
            --bg-body: #020C1B; /* Çok Koyu Arka Plan */
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* --- LOGİN EKRANI (Keskin Hatlar, Yumuşak Gölgeler) --- */
        #login-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
        }

        .login-box {
            background: var(--navy-light);
            padding: 40px;
            border-radius: 8px; /* Yumuşak köşeler */
            border-top: 4px solid var(--orange-main); /* Sert Vurgu */
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.7);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

            .login-box h1 {
                color: var(--text-light);
                margin-top: 0;
                font-size: 24px;
            }

            .login-box p {
                color: var(--text-muted);
                font-size: 14px;
                margin-bottom: 25px;
            }

        /* --- ANA DASHBOARD --- */
        #dashboard-section {
            display: none; /* Login olana kadar gizli */
            width: 100%;
            max-width: 1400px;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--navy-light);
            border-radius: 8px;
            margin-bottom: 24px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            border-left: 4px solid var(--orange-main);
        }

            .header h1 {
                margin: 0;
                font-size: 20px;
                color: var(--text-light);
            }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

            .logout-btn:hover {
                background: var(--danger);
                color: white;
            }

        /* Ana Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }

        /* Kart Tasarımları */
        .card {
            background: var(--navy-light);
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }

            .card h2 {
                margin-top: 0;
                font-size: 1.1rem;
                color: var(--text-light);
                border-bottom: 1px solid rgba(255,255,255,0.1);
                padding-bottom: 12px;
                margin-bottom: 20px;
                display: flex;
                align-items: center;
                gap: 8px;
            }

        /* Harita */
        #harita {
            height: 400px;
            border-radius: 8px;
            border: 2px solid var(--navy-dark);
            z-index: 1;
        }

        /* Form Elemanları (Sert ve modern) */
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

            .form-group label {
                display: block;
                margin-bottom: 6px;
                font-weight: 600;
                font-size: 0.85rem;
                color: var(--text-muted);
            }

        input, select {
            width: 100%;
            padding: 12px;
            background: var(--navy-dark);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-light);
            border-radius: 6px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

            input:focus, select:focus {
                outline: none;
                border-color: var(--orange-main);
                box-shadow: 0 0 0 3px rgba(255, 107, 0, 0.2); /* Yumuşak parlama */
            }

        /* Turuncu Buton (Sert renk, yumuşak etkileşim) */
        button.primary-btn {
            background-color: var(--orange-main);
            color: white;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

            button.primary-btn:hover {
                background-color: var(--orange-hover);
                transform: translateY(-2px);
                box-shadow: 0 10px 15px -3px rgba(255, 107, 0, 0.4);
            }

        /* İlan Listesi */
        .ilan-item {
            background: var(--navy-dark);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

            .ilan-item:hover {
                border-color: var(--orange-main);
            }

        .ilan-badge {
            background: rgba(255, 107, 0, 0.1);
            color: var(--orange-main);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid rgba(255, 107, 0, 0.3);
        }

        /* Bildirim Toast */
        #notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: var(--navy-light);
            border-left: 4px solid var(--orange-main);
            color: var(--text-light);
            padding: 16px 24px;
            margin-bottom: 10px;
            border-radius: 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Fiyat Sonuç Ekranı */
        #fiyatSonuc {
            margin-top: 20px;
            padding: 15px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            border-radius: 6px;
            display: none;
            color: var(--text-light);
        }
    </style>
</head>
<body>

    <div id="notification-container"></div>

    <div id="login-section">
        <div class="login-box">
            <h1>Lojistik Ağına Katıl</h1>
            <p>Devam etmek için yetkili girişi yapınız.</p>
            <div class="form-group">
                <label>E-Posta Adresi</label>
                <input type="email" id="loginEmail" placeholder="test@lojistik.com" value="admin@lojistik.com">
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" id="loginPassword" placeholder="******" value="123">
            </div>
            <button class="primary-btn" onclick="girisYap()">Sisteme Gir</button>
            <p id="loginError" style="color: var(--danger); margin-top: 15px; display: none;"></p>
        </div>
    </div>

    <div id="dashboard-section">
        <div class="header">
            <div>
                <h1>⚡ Lojistik Operasyon Merkezi</h1>
            </div>
            <div class="user-info">
                <span id="userEmailDisplay" style="color: var(--text-muted); font-size: 14px;"></span>
                <span id="connectionStatus" style="font-size: 12px; padding: 4px 8px; border-radius: 4px; background: rgba(239, 68, 68, 0.1); color: var(--danger);">🔴 Telsiz Kapalı</span>
                <button class="logout-btn" onclick="cikisYap()">Çıkış Yap</button>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="left-column">
                <div class="card">
                    <h2>🌍 Canlı Takip Radarı</h2>
                    <div id="harita"></div>
                </div>

                <div class="card">
                    <h2>🚚 Aktif Yük İlanları (Pazaryeri)</h2>
                    <button class="primary-btn" onclick="ilanlariGetir()" style="margin-bottom: 15px; background-color: var(--navy-dark); border: 1px solid rgba(255,255,255,0.1);">🔄 İlanları Senkronize Et</button>
                    <div id="ilanListesi">
                        <p style="color: var(--text-muted); text-align: center;">Güvenli bağlantı kuruldu. İlanları çekebilirsiniz.</p>
                    </div>
                </div>
            </div>

            <div class="right-column">
                <div class="card">
                    <h2>🤖 Akıllı Fiyat Motoru</h2>
                    <div class="form-group">
                        <label>Çıkış Şehri</label>
                        <input type="text" id="calcOrigin" placeholder="İstanbul">
                    </div>
                    <div class="form-group">
                        <label>Varış Şehri</label>
                        <input type="text" id="calcDest" placeholder="Ankara">
                    </div>
                    <div class="form-group">
                        <label>Araç Tipi</label>
                        <select id="calcVehicle">
                            <option value="TIR">Ağır Vasıta / TIR</option>
                            <option value="KAMYON">Kamyon</option>
                            <option value="KAMYONET">Hafif Ticari / Kamyonet</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Ek Operasyon Masrafları (TL)</label>
                        <input type="number" id="calcExtra" value="0">
                    </div>
                    <button class="primary-btn" onclick="fiyatHesapla()">Maliyet Analizi Yap</button>
                    <div id="fiyatSonuc"></div>
                </div>

                <div class="card">
                    <h2>📄 Resmi Evrak Yükleme</h2>
                    <form id="uploadForm" onsubmit="evrakYukle(event)">
                        <div class="form-group">
                            <label>İlan Numarası (ID)</label>
                            <input type="number" id="docShipmentId" required>
                        </div>
                        <div class="form-group">
                            <label>Belge Türü</label>
                            <select id="docType">
                                <option value="İrsaliye">İrsaliye</option>
                                <option value="CMR">CMR Belgesi</option>
                                <option value="Hasar_Durumu">Yük Fotoğrafı / Hasar</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Dosya Seçin</label>
                            <input type="file" id="docFile" required style="padding: 8px;">
                        </div>
                        <button type="submit" class="primary-btn" style="background-color: var(--navy-dark); border: 1px solid var(--orange-main);">Güvenli Ağa Yükle</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API ve SignalR adreslerini Dynamic (Göreceli) yaptık!
        const API_URL = "/api";

        let map;
        let routeLayer;
        let signalRConnection;

        // --- 1. UYGULAMA BAŞLANGIÇ KONTROLÜ ---
        window.onload = function () {
            const token = localStorage.getItem("jwt_token");
            if (token) {
                ekraniGoster("dashboard");
                document.getElementById("userEmailDisplay").innerText = "Kullanıcı: " + localStorage.getItem("user_email");
                haritayiBaslat();
                telsiziBaslat(token);
            } else {
                ekraniGoster("login");
            }
        };

        function ekraniGoster(ekran) {
            document.getElementById("login-section").style.display = ekran === "login" ? "flex" : "none";
            document.getElementById("dashboard-section").style.display = ekran === "dashboard" ? "block" : "none";
        }

        // --- 2. GÜVENLİK MERKEZİ (API İSTEK YÖNETİCİSİ) ---
        async function guvenliIstekAt(url, options = {}) {
            const token = localStorage.getItem("jwt_token");

            const headers = { ...options.headers };
            if (token) {
                headers["Authorization"] = `Bearer ${token}`;
            }

            if (!(options.body instanceof FormData)) {
                headers["Content-Type"] = "application/json";
            }

            const response = await fetch(url, { ...options, headers });

            if (response.status === 401 || response.status === 403) {
                showToast("Yetkiniz reddedildi veya oturumunuz düştü!");
                cikisYap();
                throw new Error("Unauthorized");
            }

            return response;
        }

        // --- 3. AUTH İŞLEMLERİ ---
        async function girisYap() {
            const email = document.getElementById("loginEmail").value;
            const pass = document.getElementById("loginPassword").value;
            const errBox = document.getElementById("loginError");

            try {
                const res = await fetch(`${API_URL}/Auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ Username: email, Password: pass })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem("jwt_token", data.token);
                    localStorage.setItem("user_email", data.email);

                    errBox.style.display = "none";
                    window.location.reload();
                } else {
                    errBox.innerText = data.message || "Giriş başarısız.";
                    errBox.style.display = "block";
                }
            } catch (e) {
                errBox.innerText = "Sunucuya ulaşılamıyor.";
                errBox.style.display = "block";
            }
        }

        function cikisYap() {
            localStorage.removeItem("jwt_token");
            localStorage.removeItem("user_email");
            window.location.reload();
        }

        // --- 4. SİGNALR (Şifreli Telsiz Bağlantısı) ---
        function telsiziBaslat(token) {
            signalRConnection = new signalR.HubConnectionBuilder()
                .withUrl("/notificationHub", { // BURASI DA GÜNCELLENDİ
                    accessTokenFactory: () => token
                })
                .withAutomaticReconnect()
                .build();

            signalRConnection.on("ReceiveNotification", function (message) {
                showToast("🔔 " + message);
            });

            signalRConnection.start().then(function () {
                const statusSpan = document.getElementById("connectionStatus");
                statusSpan.innerHTML = "🟢 Telsiz Aktif";
                statusSpan.style.background = "rgba(16, 185, 129, 0.1)";
                statusSpan.style.color = "var(--success)";

                signalRConnection.invoke("JoinUserGroup", 1).catch(err => console.error(err));
            }).catch(function (err) {
                console.error("Telsiz Bağlantı Hatası: ", err);
            });
        }

        // --- 5. İŞ MANTIKLARI (Güvenli İstekler) ---
        async function ilanlariGetir() {
            const listeDiv = document.getElementById("ilanListesi");
            listeDiv.innerHTML = "<p style='text-align:center;'>Veriler şifreli kanaldan indiriliyor...</p>";

            try {
                const response = await guvenliIstekAt(`${API_URL}/Shipments`);
                const jsonResponse = await response.json();
                const ilanlar = jsonResponse.data;

                listeDiv.innerHTML = "";
                if (ilanlar.length === 0) listeDiv.innerHTML = "<p>Aktif ilan bulunamadı.</p>";

                ilanlar.forEach(ilan => {
                    listeDiv.innerHTML += `
                            <div class="ilan-item">
                                <div>
                                    <div style="font-size: 1.1rem; margin-bottom:5px; color: var(--text-light);">
                                        <strong>${ilan.originAddress} ➔ ${ilan.destinationAddress}</strong>
                                    </div>
                                    <span class="ilan-badge">ID: ${ilan.id} | ${ilan.status}</span>
                                    <span style="margin-left:10px; color:var(--text-muted);">${ilan.weight} Ton</span>
                                </div>
                                <div style="display:flex; gap:10px;">
                                    <button onclick="rotayiCiz('${ilan.originAddress}', '${ilan.destinationAddress}')" style="background:var(--navy-light); color:white; border:1px solid rgba(255,255,255,0.2); padding: 8px 12px; border-radius:4px; cursor:pointer;">Rota</button>
                                    <button onclick="teklifVer(${ilan.id})" style="background:var(--orange-main); color:white; border:none; padding: 8px 12px; border-radius:4px; cursor:pointer;">Teklif At</button>
                                </div>
                            </div>
                        `;
                });
            } catch (error) {
                if (error.message !== "Unauthorized") {
                    listeDiv.innerHTML = `<span style="color:var(--danger);">Bağlantı hatası yaşandı.</span>`;
                }
            }
        }

        async function teklifVer(shipmentId) {
            const teklifFiyati = prompt(`${shipmentId} ID'li operasyon için fiyat teklifiniz (TL):`);
            if (!teklifFiyati) return;

            try {
                const response = await guvenliIstekAt(`${API_URL}/Offers`, {
                    method: "POST",
                    body: JSON.stringify({
                        shipmentId: shipmentId,
                        price: parseFloat(teklifFiyati),
                        validUntil: new Date(new Date().getTime() + 86400000).toISOString()
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    showToast(data.message);
                } else {
                    showToast("Sistem Reddi: " + (data.message || "Hata oluştu"));
                }
            } catch (error) {
                console.error(error);
            }
        }

        async function fiyatHesapla() {
            const origin = document.getElementById("calcOrigin").value || "İstanbul";
            const dest = document.getElementById("calcDest").value || "Ankara";
            const vehicle = document.getElementById("calcVehicle").value;
            const extra = parseFloat(document.getElementById("calcExtra").value || 0);

            try {
                const response = await guvenliIstekAt(`${API_URL}/Pricing/calculate`, {
                    method: "POST",
                    body: JSON.stringify({ originCity: origin, destinationCity: dest, vehicleType: vehicle, additionalCosts: extra })
                });

                if (response.ok) {
                    const veri = await response.json();
                    const sonucDiv = document.getElementById("fiyatSonuc");
                    sonucDiv.style.display = "block";
                    sonucDiv.innerHTML = `
                            <h4 style="margin:0 0 10px 0; color:var(--success);">📊 Analiz Raporu</h4>
                            <p style="margin:5px 0;"><strong>Güzergah:</strong> ${veri.rota} (${veri.mesafe})</p>
                            <p style="margin:5px 0;"><strong>EPDK Mazot:</strong> ${veri.guncelMazotFiyati}</p>
                            <p style="margin:5px 0;"><strong>Operasyon Maliyeti:</strong> ${veri.hizmetBedeli}</p>
                            <hr style="border:0; border-top:1px dashed var(--success); margin:10px 0; opacity:0.3;">
                            <p style="margin:5px 0; font-size:1.1rem; color:var(--success);"><strong>Sistem Önerisi: ${veri.kdvDahilToplam}</strong></p>
                        `;
                }
            } catch (error) {
                showToast("Hesaplama motoruna erişilemedi.");
            }
        }

        async function evrakYukle(event) {
            event.preventDefault();
            const shipmentId = document.getElementById("docShipmentId").value;
            const docType = document.getElementById("docType").value;
            const fileInput = document.getElementById("docFile");

            const formData = new FormData();
            formData.append("shipmentId", shipmentId);
            formData.append("documentType", docType);
            formData.append("file", fileInput.files[0]);

            try {
                const response = await guvenliIstekAt(`${API_URL}/Documents/upload`, {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();
                if (response.ok) {
                    showToast("Evrak şifrelenerek sisteme yüklendi.");
                    document.getElementById("uploadForm").reset();
                } else {
                    showToast("Sistem Reddi: " + (data.message || "Hata"));
                }
            } catch (error) {
                console.error(error);
            }
        }

        // --- HARİTA & YARDIMCILAR ---
        function haritayiBaslat() {
            if (map) return;
            map = L.map('harita').setView([39.0, 35.0], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap © CartoDB'
            }).addTo(map);
            routeLayer = L.layerGroup().addTo(map);
        }

        const sehirKoordinatlari = {
            "İstanbul": [41.0082, 28.9784], "Ankara": [39.9208, 32.8541],
            "İzmir": [38.4192, 27.1287], "Bursa": [40.1885, 29.0610],
            "Adana": [36.9914, 35.3308], "Van": [38.5012, 43.3730], "Mersin": [36.8121, 34.6415]
        };

        function rotayiCiz(baslangic, varis) {
            if (!routeLayer) return;
            routeLayer.clearLayers();
            const startPos = sehirKoordinatlari[baslangic] || sehirKoordinatlari["İstanbul"];
            const endPos = sehirKoordinatlari[varis] || sehirKoordinatlari["Ankara"];

            const icon = L.divIcon({ className: 'custom-div-icon', html: "<div style='background-color:#FF6B00; width:12px; height:12px; border-radius:50%; border:2px solid white;'></div>", iconSize: [16, 16] });

            L.marker(startPos, { icon: icon }).addTo(routeLayer).bindPopup("Çıkış: " + baslangic);
            L.marker(endPos, { icon: icon }).addTo(routeLayer).bindPopup("Varış: " + varis);

            var line = L.polyline([startPos, endPos], { color: '#FF6B00', weight: 3, opacity: 0.8, dashArray: '5, 10' }).addTo(routeLayer);
            map.fitBounds(line.getBounds(), { padding: [50, 50] });
        }

        function showToast(message) {
            const container = document.getElementById("notification-container");
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.innerHTML = `<strong>Sistem Bildirimi:</strong> ${message}`;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 5000);
        }
    </script>
</body>
</html>
